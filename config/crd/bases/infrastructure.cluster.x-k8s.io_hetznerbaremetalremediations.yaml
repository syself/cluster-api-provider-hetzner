    name: v1beta1
    schema:
      openAPIV3Schema:
        description: HetznerBareMetalRemediation is the Schema for the hetznerbaremetalremediations
          API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: HetznerBareMetalRemediationSpec defines the desired state
              of HetznerBareMetalRemediation.
            properties:
              strategy:
                description: Strategy field defines the remediation strategy to be
                  applied.
                properties:
                  cooldown:
                    default: 30m
                    description: |-
                      Cooldown is the minimum time between successive remediations of the same
                      machine. If a new remediation starts within this window of the previous
                      successful one, the reboot is skipped and the machine is deleted.
                      Set to 0s to disable the guard.
                    type: string
                    x-kubernetes-validations:
                    - message: cooldown must be non-negative
                      rule: duration(self) >= duration('0s')
                  onExhaustion:
                    default: Reuse
                    description: |-
                      OnExhaustion selects what happens when remediation runs out of retries and
                      the node is still unhealthy. Reuse (default) deletes the machine and frees
                      the host to be provisioned again. Retire sets a permanent error on the host,
                      which deletes the machine and keeps the host out of the pool until a human
                      removes the capi.syself.com/permanent-error annotation.
                    enum:
                    - Reuse
                    - Retire
                    type: string
                  retryLimit:
                    description: RetryLimit sets the maximum number of remediation
                      retries. Zero retries if not set.
                    type: integer
                  timeout:
                    description: Timeout sets the timeout between remediation retries.
                      It should be of the form "10m", or "40s".
                    type: string
                  type:
                    default: Reboot
                    description: Type represents the type of the remediation strategy.
                      At the moment, only "Reboot" is supported.
                    type: string
                required:
                - timeout
                type: object
            type: object
          status:
            description: |-
              HetznerBareMetalRemediationStatus defines the observed state of HetznerBareMetalRemediation.
              The v1beta2 status reshapes the retryCount and lastRemediated fields, so conversion is
              hand-written in conversion.go instead of generated.
            properties:
              lastRemediated:
