apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: KubeadmControlPlane
metadata:
  name: "${CLUSTER_NAME}-control-plane"
spec:
  kubeadmConfigSpec:
    initConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          - name: rotate-server-certificates
            value: "false"
    joinConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          - name: rotate-server-certificates
            value: "false"
