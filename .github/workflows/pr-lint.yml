name: "Lint Pull Request"
on: # yamllint disable-line rule:truthy
  workflow_dispatch:
  push:
    branches:
      - v1.1.x
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
    paths:
      - "**.go"
      - "**go.mod"
      - "**go.sum"
      - "<templates|test>/**/*.<yml|yaml>"
      - ".github/actions/**/*"
      - ".github/workflows/e2e-*"
      - ".github/workflows/pr-*"
      - ".golangci.yaml"
      - "images/caph/**"
      - "!**/vendor/**"
      - "test/e2e/**"
      - "docs/**"
# yamllint disable rule:line-length
jobs:
  pr-lint:
    name: "Lint Pull Request"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/syself/caph-builder:1.0.29
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.github_token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Fixup git permissions
        # https://github.com/actions/checkout/issues/766
        shell: bash
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Verify Golang Modules
        run: make generate-modules-ci

      - name: Cache lychee responses (Link Checker)
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: .lycheecache
          key: cache-lychee-${{ runner.os }}-${{ hashFiles('.lychee.toml') }}
          restore-keys: |
            cache-lychee-${{ runner.os }}-
            cache-lychee-

      # to ensure we don't miss any files that were supposed to be autogenerated.
      # if there's a diff then the workflow will exit here.
      - name: Run make verify
        run: make verify
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint Golang Code
        run: make lint-golang

      - name: Lint YAML
        run: make lint-yaml-ci
