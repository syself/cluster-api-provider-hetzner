apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: HetznerCluster
metadata:
  name: "${CLUSTER_NAME}"
  annotations:
    capi.syself.com/use-hrobot-provider-id-for-baremetal: "true"
spec:
  hcloudNetwork:
    enabled: false
  controlPlaneRegions:
    - "${HCLOUD_REGION}"
  controlPlaneEndpoint:
    host: ""
    port: 443
  controlPlaneLoadBalancer:
    region: "${HCLOUD_REGION}"
  sshKeys:
    hcloud:
      - name: "${SSH_KEY_NAME}"
    robotRescueSecretRef:
      name: robot-ssh
      key:
        name: sshkey-name
        publicKey: ssh-publickey
        privateKey: ssh-privatekey
  hetznerSecretRef:
    name: hcloud
    key:
      hcloudToken: token
      hetznerRobotUser: robot-user
      hetznerRobotPassword: robot-password
